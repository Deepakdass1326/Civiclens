services:
  - type: web
    name: civiclens-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: FORWARDING_WEBHOOK_URL
        sync: false
